name: Build Armbian TVBox

on:
  workflow_dispatch:
    inputs:
      board:
        description: '设备名称 (如: r3300l)'
        required: true
        default: 'r3300l'
      release:
        description: '系统版本 (jammy: Ubuntu 22.04, bookworm: Debian 12, noble: Ubuntu 24.04)'
        required: true
        default: 'jammy'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 1. 检出自定义配置仓库（根目录下的所有文件）
      - name: Checkout Custom Configs
        uses: actions/checkout@v4

      # 2. 检出 Armbian 官方编译库（路径为 armbian-build）
      - name: Checkout Armbian Build Framework
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: armbian-build
          ref: main

      # 3. 安装编译依赖（使用根目录下的 scripts/requirements.sh）
      - name: Install Dependencies
        run: |
          cd armbian-build
          sudo ../scripts/requirements.sh

      # 4. 注入自定义文件（复制userpatches下的所有子目录和文件到armbian-build/userpatches/）
      - name: Inject Custom Userpatches
        run: |
          # 处理 u-boot 子目录
          mkdir -p armbian-build/userpatches/u-boot/amlogic/s905lb-r3300l
          cp -f ../userpatches/u-boot/amlogic/s905lb-r3300l/r3300l-u-boot.bin.sd.bin armbian-build/userpatches/u-boot/amlogic/s905lb-r3300l/
          cp -f ../userpatches/u-boot/amlogic/s905lb-r3300l/u-boot-r3300l.bin armbian-build/userpatches/u-boot/amlogic/s905lb-r3300l/

          # 处理 overlay 子目录
          mkdir -p armbian-build/userpatches/overlay/boot/dtb/amlogic/s905lb-r3300l
          cp -f ../userpatches/overlay/boot/dtb/amlogic/s905lb-r3300l/meson-gxl-s905x-p212.dtb armbian-build/userpatches/overlay/boot/dtb/amlogic/s905lb-r3300l/

          # 处理 lib 子目录
          mkdir -p armbian-build/userpatches/lib
          cp -f ../userpatches/lib/compilation_u-boot.sh armbian-build/userpatches/lib/

          # 处理 configs 子目录
          mkdir -p armbian-build/userpatches/configs
          cp -f ../userpatches/configs/config-r3300l.conf armbian-build/userpatches/configs/

      # 5. 执行无人值守编译
      - name: Build Armbian Image
        run: |
          cd armbian-build
          ./compile.sh \
            BOARD=${{ github.event.inputs.board }} \
            BRANCH=legacy \
            RELEASE=${{ github.event.inputs.release }} \
            BUILD_MINIMAL=no \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUTIMAGE=sha,gpg,xz

      # 6. 整理编译产物
      - name: Organize Artifacts
        run: |
          mkdir -p output
          find armbian-build/output/images/ -type f \( -name "*.img.xz" -o -name "*.img.xz.sha" \) -exec cp {} output/ \;

      # 7. 上传到 GitHub Releases
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.board }}-${{ github.event.inputs.release }}-${{ github.run_number }}
          name: Armbian for ${{ github.event.inputs.board }} ($
