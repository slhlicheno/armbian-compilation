name: Build Armbian (Self-hosted U-Boot + DTB Overlay)

on:
  workflow_dispatch:
    inputs:
      armbian_release:
        description: "系统版本"
        required: true
        type: choice
        default: 'trixie'
        options:
          - bookworm
          - trixie
          - noble
      kernel_branch:
        description: "内核分支 (unifreq 源码)"
        required: true
        type: choice
        default: "5.15.y"
        options:
          - 5.15.y
          - 6.1.y
          - 6.6.y

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出你的仓库
        uses: actions/checkout@v4

      - name: 拉取 Armbian 官方构建镜像
        run: docker pull ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest

      - name: 准备构建环境
        run: |
          git clone --depth=1 --branch=main https://github.com/armbian/build armbian-sdk

          # 复制 DTB overlay 文件 (按照你提供的目录结构)
          mkdir -p armbian-sdk/userpatches/overlay/boot/dtb/amlogic/s905lb-r3300l
          if [ -f "userpatches/overlay/boot/dtb/amlogic/s905lb-r3300l/meson-gxl-s905x-p212.dtb" ]; then
            cp userpatches/overlay/boot/dtb/amlogic/s905lb-r3300l/meson-gxl-s905x-p212.dtb armbian-sdk/userpatches/overlay/boot/dtb/amlogic/s905lb-r3300l/
            echo "✅ 自定义 DTB 已复制"
          else
            echo "⚠️ 未找到自定义 DTB"
          fi

          # 复制预编译 U-Boot 文件 (按照你提供的目录结构)
          mkdir -p armbian-sdk/userpatches/u-boot/amlogic/s905lb-r3300l
          if [ -d "userpatches/u-boot/amlogic/s905lb-r3300l" ] && [ "$(ls -A userpatches/u-boot/amlogic/s905lb-r3300l 2>/dev/null)" ]; then
            cp -a userpatches/u-boot/amlogic/s905lb-r3300l/* armbian-sdk/userpatches/u-boot/amlogic/s905lb-r3300l/
            echo "✅ 预编译 U-Boot 已就位"
          else
            echo "❌ 未找到预编译 U-Boot 文件"
            exit 1
          fi

          # 复制 U-Boot 劫持脚本
          mkdir -p armbian-sdk/userpatches/lib
          if [ -f "userpatches/lib/compilation_u-boot.sh" ]; then
            cp userpatches/lib/compilation_u-boot.sh armbian-sdk/userpatches/lib/
            echo "✅ U-Boot 劫持脚本已就位"
          else
            echo "❌ 缺少 U-Boot 劫持脚本"
            exit 1
          fi

          echo "✅ 所有自定义文件已就位"

      - name: 配置宿主机的 QEMU 支持
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          sudo modprobe binfmt_misc 2>/dev/null || true
          sudo mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc 2>/dev/null || true
          if [ ! -f /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo ':qemu-aarch64:M::\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00:\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/qemu-aarch64-static:F' | sudo tee /proc/sys/fs/binfmt_misc/register
          fi

      - name: 完整构建 (内核 + RootFS + 打包)
        run: |
          mkdir -p output
          docker run --rm --privileged \
            -v "$PWD/armbian-sdk":/armbian \
            -v "$PWD/output":/armbian/output \
            -e ALLOW_ROOT=yes \
            ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest \
            /bin/bash -c "
              cd /armbian
              # 加载 U-Boot 劫持脚本
              source userpatches/lib/compilation_u-boot.sh
              echo '>> 开始完整构建...'
              # 使用 odroidn2 作为基础板子 (SDK 原生支持)
              ./compile.sh \
                BOARD=odroidn2 \
                BRANCH=current \
                RELEASE=${{ inputs.armbian_release }} \
                KERNELSOURCE=https://github.com/unifreq/linux-${{ inputs.kernel_branch }} \
                KERNELBRANCH=${{ inputs.kernel_branch }} \
                BUILD_MINIMAL=yes \
                BUILD_DESKTOP=no \
                KERNEL_CONFIGURE=no \
                docker=no
            "

      - name: 收集镜像并上传
        run: |
          mkdir -p output-final
          cp output/images/*.img.xz output-final/ 2>/dev/null || true
          cp output/images/*.img.gz output-final/ 2>/dev/null || true
          echo "✅ 镜像已收集"

      - name: 上传到 Release
        uses: ncipollo/release-action@main
        with:
          tag: "Armbian-${{ inputs.armbian_release }}-r3300l-${{ inputs.kernel_branch }}"
          artifacts: "output-final/*.img.*"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            📦 Armbian (自定义 U-Boot + DTB)
            - 设备: R3300L
            - 内核: unifreq/linux-${{ inputs.kernel_branch }}
            - 系统: ${{ inputs.armbian_release }}
